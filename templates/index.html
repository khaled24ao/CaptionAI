<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptionAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .upload-area {
            border: 2px dashed #333;
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }

        .upload-area:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            opacity: 0.5;
        }

        .upload-text {
            color: #888;
        }

        .preview-container {
            display: none;
            margin-bottom: 2rem;
            text-align: center;
        }

        .preview-container.active {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 0.5rem;
            object-fit: contain;
        }

        .remove-image {
            background: #333;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .card {
            background: #1a1a1a;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 0.75rem;
        }

        .caption-card {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            border: 1px solid #4338ca;
        }

        .caption-card .card-content {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .description-card .card-content {
            line-height: 1.6;
            color: #bbb;
        }

        .mood-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .mood-badge.serene { background: #064e3b; color: #6ee7b7; }
        .mood-badge.energetic { background: #7f1d1d; color: #fca5a5; }
        .mood-badge.playful { background: #713f12; color: #fcd34d; }
        .mood-badge.mysterious { background: #4c1d95; color: #c4b5fd; }
        .mood-badge.default { background: #1f2937; color: #9ca3af; }

        .hashtags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .hashtag {
            background: #1e40af;
            color: #93c5fd;
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .hashtag:hover {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        .hashtag.copied {
            background: #047857;
        }

        .alt-text-card {
            background: #111;
            border: 1px solid #333;
        }

        .alt-text-content {
            font-family: "Monaco", "Menlo", monospace;
            font-size: 0.9rem;
            color: #a5f3fc;
            word-break: break-all;
        }

        .copy-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .copy-btn:hover {
            background: #444;
        }

        .copy-btn.copied {
            background: #047857;
        }

        .use-case-card {
            background: #1a1a1a;
        }

        .use-case-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .use-case-item:last-child {
            border-bottom: none;
        }

        .use-case-number {
            background: #6366f1;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .error-message {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            h1 {
                font-size: 2rem;
            }
            .upload-area {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CaptionAI</h1>
            <p class="subtitle">AI-powered image descriptions</p>
        </header>

        <div class="error-message" id="error"></div>

        <div class="upload-area" id="uploadArea">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="upload-text">Drag & drop or click to upload</p>
            <p style="color: #555; font-size: 0.85rem; margin-top: 0.5rem;">JPG, PNG, WebP (max 5MB)</p>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">

        <div class="preview-container" id="previewContainer">
            <img class="preview-image" id="previewImage" alt="Preview">
            <br>
            <button class="remove-image" id="removeImage">Remove & Upload New</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");
        const previewContainer = document.getElementById("previewContainer");
        const previewImage = document.getElementById("previewImage");
        const removeImageBtn = document.getElementById("removeImage");
        const loading = document.getElementById("loading");
        const results = document.getElementById("results");
        const errorDiv = document.getElementById("error");

        uploadArea.addEventListener("click", () => fileInput.click());

        uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("dragover");
        });

        uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("dragover");
        });

        uploadArea.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadArea.classList.remove("dragover");
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        removeImageBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            resetUI();
        });

        function handleFile(file) {
            if (!file.type.match(/^image\/(jpeg|png|webp)$/)) {
                showError("Invalid file format. Allowed: JPG, PNG, WebP");
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError("File too large. Maximum size is 5MB");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.classList.add("active");
                uploadArea.style.display = "none";
                uploadToAPI(file);
            };
            reader.readAsDataURL(file);
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add("active");
            setTimeout(() => errorDiv.classList.remove("active"), 5000);
        }

        function resetUI() {
            fileInput.value = "";
            previewContainer.classList.remove("active");
            uploadArea.style.display = "block";
            results.classList.remove("active");
            loading.classList.remove("active");
            errorDiv.classList.remove("active");
        }

        async function uploadToAPI(file) {
            loading.classList.add("active");
            results.classList.remove("active");
            errorDiv.classList.remove("active");

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch("/api/v1/caption", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Failed to generate caption");
                }

                displayResults(data.result);
            } catch (err) {
                showError(err.message);
                resetUI();
            } finally {
                loading.classList.remove("active");
            }
        }

        function displayResults(rawResult) {
            let parsed;
            try {
                const jsonMatch = rawResult.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    parsed = JSON.parse(jsonMatch[0]);
                } else {
                    parsed = {
                        caption: rawResult,
                        detailed_description: "",
                        hashtags: [],
                        alt_text: "",
                        mood: "",
                        use_cases: []
                    };
                }
            } catch {
                parsed = {
                    caption: rawResult,
                    detailed_description: "",
                    hashtags: [],
                    alt_text: "",
                    mood: "",
                    use_cases: []
                };
            }

            const hashtagsHtml = Array.isArray(parsed.hashtags) 
                ? parsed.hashtags.map(tag => `<button class="hashtag" onclick="copyHashtag('${tag}', this)">#${tag}</button>`).join("")
                : "";

            const useCasesHtml = Array.isArray(parsed.use_cases) && parsed.use_cases.length > 0
                ? parsed.use_cases.map((uc, i) => `
                    <div class="use-case-item">
                        <span class="use-case-number">${i + 1}</span>
                        <span>${uc}</span>
                    </div>
                `).join("")
                : '<p style="color: #666;">No use cases available</p>';

            const moodClass = getMoodClass(parsed.mood);

            results.innerHTML = `
                <div class="card caption-card">
                    <div class="card-label">Caption</div>
                    <div class="card-content">${parsed.caption || "N/A"}</div>
                </div>

                <div class="card description-card">
                    <div class="card-label">Detailed Description</div>
                    <div class="card-content">${parsed.detailed_description || "N/A"}</div>
                </div>

                <div class="card">
                    <div class="card-label">Mood</div>
                    <span class="mood-badge ${moodClass}">${parsed.mood || "Unknown"}</span>
                </div>

                <div class="card">
                    <div class="card-label">Hashtags</div>
                    <div class="hashtags">${hashtagsHtml || '<span style="color: #666;">No hashtags available</span>'}</div>
                </div>

                <div class="card alt-text-card">
                    <div class="card-label">
                        Alt Text
                        <button class="copy-btn" onclick="copyAltText('${escapeHtml(parsed.alt_text || "")}')">Copy</button>
                    </div>
                    <div class="alt-text-content">${parsed.alt_text || "N/A"}</div>
                </div>

                <div class="card use-case-card">
                    <div class="card-label">Use Cases</div>
                    ${useCasesHtml}
                </div>
            `;

            results.classList.add("active");
        }

        function getMoodClass(mood) {
            if (!mood) return "default";
            const m = mood.toLowerCase();
            if (m.includes("serene") || m.includes("calm") || m.includes("peace")) return "serene";
            if (m.includes("energy") || m.includes("excite") || m.includes("vibrant")) return "energetic";
            if (m.includes("play") || m.includes("fun") || m.includes("joy")) return "playful";
            if (m.includes("mystery") || m.includes("dark") || m.includes("moody")) return "mysterious";
            return "default";
        }

        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function copyHashtag(tag, btn) {
            navigator.clipboard.writeText("#" + tag).then(() => {
                btn.classList.add("copied");
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove("copied");
                }, 1500);
            });
        }

        function copyAltText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.classList.add("copied");
                btn.textContent = "Copied!";
                setTimeout(() => {
                    btn.textContent = "Copy";
                    btn.classList.remove("copied");
                }, 1500);
            });
        }
    </script>
</body>
</html>
